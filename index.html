<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日资讯精选</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#f7f7f7;
    font-family:-apple-system,BlinkMacSystemFont,
                "PingFang SC","Helvetica Neue",
                Helvetica,Arial,sans-serif;
}

.header{
    background:white;
    padding:20px;
    text-align:center;
    border-bottom:1px solid #eee;
}

.header h1{
    font-size:24px;
    color:#333;
}

.date{
    color:#999;
    margin-top:8px;
    font-size:14px;
}

.container{
    max-width:800px;
    margin:20px auto;
    padding:0 15px;
}

.card{
    background:white;
    border-radius:12px;
    padding:18px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,.05);
}

.card h2{
    font-size:18px;
    color:#222;
    margin-bottom:10px;
}

.card p{
    line-height:1.8;
    color:#666;
}

.footer{
    text-align:center;
    color:#999;
    padding:30px;
}
</style>

</head>

<body>

<div class="header">
    <h1>每日资讯精选</h1>
    <div class="date">2026年6月14日</div>
</div>

<div class="container">

    <div class="card">
        <h2>1. 国务院部署稳就业工作</h2>
        <p>
            会议强调扩大就业岗位供给，支持重点群体就业创业，
            推动经济持续回升向好。
        </p>
    </div>

    <div class="card">
        <h2>2. 央行公布最新金融数据</h2>
        <p>
            社会融资规模保持增长，
            金融支持实体经济力度进一步增强。
        </p>
    </div>

    <div class="card">
        <h2>3. 全国多地迎来高温天气</h2>
        <p>
            气象部门提醒公众做好防暑降温工作，
            注意用电安全。
        </p>
    </div>

</div>

<div class="footer">
    每日资讯精选 · 每天5分钟了解天下事
</div>

</body>
</html>
